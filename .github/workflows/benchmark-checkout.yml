name: Phase 1 Benchmark Checkout

on:
  workflow_dispatch:
  push:
    paths:
      - build.gradle.kts
      - settings.gradle.kts
      - gradle/**
      - gradlew
      - gradlew.bat
      - src/**
      - benchmarks/hikaricp.yml
      - benchmarks/spring-petclinic.yml
      - .github/workflows/benchmark-checkout.yml
  pull_request:
    paths:
      - build.gradle.kts
      - settings.gradle.kts
      - gradle/**
      - gradlew
      - gradlew.bat
      - src/**
      - benchmarks/hikaricp.yml
      - benchmarks/spring-petclinic.yml
      - .github/workflows/benchmark-checkout.yml

jobs:
  benchmark-checkout:
    name: Checkout ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - benchmarks/hikaricp.yml
          - benchmarks/spring-petclinic.yml

    steps:
      - name: Checkout harness repository
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run benchmark checkout sanity checks
        id: checkout
        shell: bash
        run: |
          ./gradlew --no-daemon run --args="checkout-benchmark --config ${{ matrix.config }} --run-build --github-summary $GITHUB_STEP_SUMMARY --github-output $GITHUB_OUTPUT"
