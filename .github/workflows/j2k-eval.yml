name: J2K Evaluation Pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - build.gradle.kts
      - settings.gradle.kts
      - gradle/**
      - gradlew
      - gradlew.bat
      - src/**
      - benchmarks/hikaricp.yml
      - benchmarks/spring-petclinic.yml
      - benchmarks/j2k-edge-cases.yml
      - j2k-runner-plugin/**
      - .github/workflows/j2k-eval.yml
  pull_request:
    paths:
      - build.gradle.kts
      - settings.gradle.kts
      - gradle/**
      - gradlew
      - gradlew.bat
      - src/**
      - benchmarks/hikaricp.yml
      - benchmarks/spring-petclinic.yml
      - benchmarks/j2k-edge-cases.yml
      - j2k-runner-plugin/**
      - .github/workflows/j2k-eval.yml

jobs:
  # Fan-out: one job per (benchmark, converter kind). Each converts + evaluates and
  # uploads its per-kind reports/outputs as an artifact for the compare job.
  convert-eval:
    name: ${{ matrix.benchmark }} · ${{ matrix.kind }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        benchmark: [hikaricp, spring-petclinic, j2k-edge-cases]
        kind: [k1-old-dumb, k1-old-smart, k1-new, k2]

    steps:
      - name: Checkout harness repository
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate and checkout benchmark inputs
        shell: bash
        run: |
          ./gradlew --no-daemon run --args="checkout --config benchmarks/${{ matrix.benchmark }}.yml --github-summary $GITHUB_STEP_SUMMARY --github-output $GITHUB_OUTPUT"

      - name: Run static J2K conversion (${{ matrix.kind }})
        timeout-minutes: 30
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/j2k/${{ matrix.benchmark }}/${{ matrix.kind }}/logs
          ./gradlew --no-daemon --console=plain --stacktrace convert -PbenchmarkConfig=benchmarks/${{ matrix.benchmark }}.yml -Pkind=${{ matrix.kind }} 2>&1 \
            | tee build/j2k/${{ matrix.benchmark }}/${{ matrix.kind }}/logs/gradle-convert.log

      - name: Run evaluator (${{ matrix.kind }})
        shell: bash
        run: |
          ./gradlew --no-daemon run --args="evaluate --config benchmarks/${{ matrix.benchmark }}.yml --kind ${{ matrix.kind }} --github-summary $GITHUB_STEP_SUMMARY"

      # Fail the job only when the converter crashed entirely (status=failed, 0 files
      # converted). Partial conversion (some files errored) is expected evaluation data —
      # e.g. k1-old-dumb cannot resolve types without indexes — and must not fail the pipeline.
      - name: Fail on converter errors
        shell: bash
        run: |
          report=build/j2k/${{ matrix.benchmark }}/${{ matrix.kind }}/conversion.json
          status=$(jq -r '.status' "$report")
          echo "conversion status=$status"
          if [ "$status" = "failed" ]; then
            echo "::error::J2K conversion for ${{ matrix.benchmark }} (${{ matrix.kind }}) failed entirely"
            jq -r '.errors[]' "$report" | head -20
            exit 1
          fi

      # Upload both report and conversion subtrees: their common ancestor is `build/`,
      # so the artifact preserves `reports/j2k-eval/<id>/<kind>/…`, letting the compare
      # job reconstruct the exact tree via a merged download.
      - name: Upload per-kind reports and outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ matrix.benchmark }}-${{ matrix.kind }}
          path: |
            build/reports/j2k-eval/${{ matrix.benchmark }}/${{ matrix.kind }}
            build/j2k/${{ matrix.benchmark }}/${{ matrix.kind }}
          if-no-files-found: warn

  # Fan-in: one job per benchmark. Downloads all of that benchmark's per-kind reports
  # and compiles them into a single comparison. Runs even if some kind jobs failed.
  compare:
    name: Compare ${{ matrix.benchmark }}
    runs-on: ubuntu-latest
    needs: convert-eval
    if: always()
    strategy:
      fail-fast: false
      matrix:
        benchmark: [hikaricp, spring-petclinic, j2k-edge-cases]

    steps:
      - name: Checkout harness repository
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # merge-multiple reconstructs build/reports/j2k-eval/<id>/<kind>/evaluation.json
      # for every kind whose job uploaded an artifact (missing kinds are simply absent).
      - name: Download per-kind evaluation reports
        uses: actions/download-artifact@v4
        with:
          pattern: eval-${{ matrix.benchmark }}-*
          merge-multiple: true
          path: build

      - name: Compile comparison
        shell: bash
        run: |
          ./gradlew --no-daemon run --args="compare --config benchmarks/${{ matrix.benchmark }}.yml --github-summary $GITHUB_STEP_SUMMARY"

      - name: Upload comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-${{ matrix.benchmark }}
          path: build/reports/j2k-eval/${{ matrix.benchmark }}/comparison.*
          if-no-files-found: warn
